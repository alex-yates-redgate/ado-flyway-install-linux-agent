# azure-pipelines.yml
#
# Sample pipeline that installs and licences Flyway on a Linux agent.
#
# Prerequisites — create a variable group called "flyway-credentials" in
# Pipelines > Library and add the following variables:
#
#   FLYWAY_EMAIL    - Your Redgate account email address
#   FLYWAY_PAT      - Your Redgate personal access token (mark as secret)
#   FLYWAY_VERSION  - Version to install: "latest" or a specific version e.g. "11.9.2"
#   FLYWAY_EDITION  - "Community" or "Enterprise"
#
# The pipeline calls the reusable template in templates/install-flyway.yml.

trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: flyway-credentials  # Must contain: FLYWAY_EMAIL, FLYWAY_PAT, FLYWAY_VERSION, FLYWAY_EDITION

steps:
  - template: templates/install-flyway.yml
    parameters:
      FLYWAY_EMAIL: $(FLYWAY_EMAIL)
      FLYWAY_PAT: $(FLYWAY_PAT)
      FLYWAY_VERSION: $(FLYWAY_VERSION)
      FLYWAY_EDITION: $(FLYWAY_EDITION)
